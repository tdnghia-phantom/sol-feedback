<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>SOL Feedback — Test</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    background:#FAF4ED; color:#4E6128;
    min-height:100vh; min-height:100dvh; display:grid; place-items:center; padding:20px;
  }
  .test-word{font-size:clamp(72px, 34vw, 220px); font-weight:900; letter-spacing:2px; line-height:1}
  .page-gate{position:fixed; inset:0; z-index:99999; background:#FAF4ED; display:grid; place-items:center}
  .page-gate .spin{width:38px; height:38px; border-radius:50%; border:4px solid #EADFC9; border-top-color:#6C813E; animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="page-gate" data-fb-gate aria-hidden="true"><div class="spin"></div></div>
  <div class="test-word">test</div>

  <script>
    // Trang test tham gia hệ thống bật/tắt: TẮT → feedback-submit.js tự redirect về trang chính.
    window.WS_ID = 'test';
  </script>
  <script src="feedback-submit.js" defer></script>
</body>
</html>
